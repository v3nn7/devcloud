services:
  server:
    build:
      context: ./server
    container_name: devcloud-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    volumes:
      - server-db:/app/db
      - server-uploads:/app/uploads
    environment:
      - NODE_ENV=production

  client:
    build:
      context: ./client
    container_name: devcloud-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  server-db:
  server-uploads:
